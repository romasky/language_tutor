# HTTP — redirect to HTTPS + Let's Encrypt ACME challenge
server {
    listen 80;
    server_name YOURDOMAIN.COM;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to n8n
server {
    listen 443 ssl;
    server_name YOURDOMAIN.COM;

    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Max body size for voice messages (Telegram sends up to ~20MB)
    client_max_body_size 25M;

    location / {
        proxy_pass         http://n8n:5678;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (n8n UI uses websockets)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Extended timeouts for AI API calls (Whisper, Claude can take 20-30s)
        proxy_read_timeout    120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
    }
}
